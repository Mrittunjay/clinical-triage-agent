<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Emergency Intake</title>

  <style>
    body {
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(120deg, #e8f0ff, #f7fafc);
      padding: 40px;
    }

    #chat {
      max-width: 720px;
      margin: auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin: 0 0 12px 0;
      color: #1f3a8a;
      text-align: center;
    }

    .protocol-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .protocol-bar span {
      font-weight: 600;
    }

    .protocol-bar button {
      padding: 6px 12px;
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    #messages {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
    }

    .assistant {
      align-self: flex-start;
      background: #eef2ff;
    }

    .patient {
      align-self: flex-end;
      background: #dbeafe;
    }

    #inputArea {
      margin-top: 20px;
      display: none;
      gap: 10px;
    }

    #inputArea input {
      flex: 1;
      padding: 8px;
      font-size: 14px;
    }

    button.primary {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }
  </style>
</head>

<body>

<div id="chat">
  <h2>Emergency Intake</h2>

  <div class="protocol-bar">
    <span>Protocol: <span id="protocolLabel">—</span></span>
    <button onclick="openModal()">Change Protocol</button>
  </div>

  <button class="primary" id="startBtn">Start Intake</button>

  <div id="messages"></div>

  <div id="inputArea">
    <input id="userInput" type="text" placeholder="Type your answer..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- Protocol Modal -->
<div class="modal" id="protocolModal">
  <div class="modal-content">
    <h3>Admin Authentication</h3>
    <input id="adminUser" placeholder="Username" />
    <input id="adminPass" type="password" placeholder="Password" />
    <button class="primary" onclick="confirmProtocolChange()">Confirm</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
  const ADMIN_USER = "admin";
  const ADMIN_PASS = "admin123";

  let sessionId = null;
  let currentProtocol = null;
  
  // Doctors registry (Demo Purpose)
  const DOCTORS_BY_PROTOCOL = {
    ATP: [
      { name: "Dr. Ananya Rao", specialty: "Emergency Medicine" },
      { name: "Dr. Vikram Iyer", specialty: "Internal Medicine" },
      { name: "Dr. Neha Kapoor", specialty: "General Practice" }
    ],
    NTS: [
      { name: "Dr. Jeroen van Dijk", specialty: "Emergency Geneeskunde" },
      { name: "Dr. Sophie de Vries", specialty: "Interne Geneeskunde" },
      { name: "Dr. Mark Jansen", specialty: "Huisarts" }
    ]
  };

  fetch("/admin/config")
    .then(r => r.json())
    .then(cfg => {
      currentProtocol = cfg.triageStandard;
      protocolLabel.textContent = currentProtocol;
    });

  function openModal() {
    protocolModal.style.display = "flex";
  }

  function closeModal() {
    protocolModal.style.display = "none";
  }

  async function confirmProtocolChange() {
    if (adminUser.value !== ADMIN_USER || adminPass.value !== ADMIN_PASS) {
      alert("Invalid admin credentials");
      return;
    }
    const newProtocol = currentProtocol === "ATP" ? "NTS" : "ATP";
    await fetch("/admin/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ triageStandard: newProtocol })
    });
    currentProtocol = newProtocol;
    protocolLabel.textContent = currentProtocol;
    closeModal();
  }

  function addMessage(text, role) {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.textContent = text;
    messages.appendChild(div);
  }

  startBtn.onclick = async () => {
    const res = await fetch("/intake/start", { method: "POST" });
    const data = await res.json();
    sessionId = data.sessionId;
    inputArea.style.display = "flex";
    if (typeof data.message === "string") {
      addMessage(data.message, "assistant");
    }
  };

  async function sendMessage() {
    if (!userInput.value.trim()) return;

    addMessage(userInput.value, "patient");

    const res = await fetch("/intake/message", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId, message: userInput.value })
    });

    const data = await res.json();

    // IN PROGRESS
    if (data.status === "IN_PROGRESS" && typeof data.message === "string") {
      addMessage(data.message, "assistant");
      userInput.value = "";
      return;
    }

    // COMPLETION (same logic that worked before)
    if (data.status === "COMPLETE") {
      inputArea.style.display = "none";
      userInput.value = "";

      addMessage("Triage Complete", "assistant");

      // Normalize payload
      const finalPayload =
        data.triage_result ? data :
        (typeof data.message === "object" ? data.message : data);

      // Assign doctor based on protocol (AFTER triage)
      const doctors = DOCTORS_BY_PROTOCOL[currentProtocol] || [];
      const assignedDoctor = doctors.length
        ? doctors[Math.floor(Math.random() * doctors.length)]
        : null;

      // Attach to payload so both UIs can access it
      finalPayload.assignedDoctor = assignedDoctor;

      localStorage.setItem("triage_case", JSON.stringify(finalPayload));

      // Parse triage_result (stringified JSON)
      let triage = {};
      try {
        if (finalPayload.triage_result) {
          triage = JSON.parse(finalPayload.triage_result);
        }
      } catch {}

      const triageColor = triage.triageColor || "UNKNOWN";
      const tests = triage.suggestedTests || [];

      const color =
        triageColor === "RED" ? "#dc2626" :
        triageColor === "YELLOW" ? "#ca8a04" :
        triageColor === "GREEN" ? "#16a34a" :
        "#374151";

      // if (
      //   finalPayload.input_content_safety?.categoriesAnalysis
      //     ?.some(c => c.severity > 0)
      // ) {
      //   addMessage(
      //     "Content Safety Alert Human Review Required",
      //     "assistant"
      //   );
      // }

      // Content safety banner (rendered below "Triage Complete")
      let safetyBanner = "";
      if (
        finalPayload.input_content_safety?.categoriesAnalysis
          ?.some(c => c.severity > 0)
      ) {
        safetyBanner = `
          <div style="
            margin-top:10px;
            padding:10px;
            background:#fee2e2;
            color:#991b1b;
            border-radius:6px;
            font-weight:600;
          ">
            Content Safety Alert - Human Review Required
          </div>
        `;
      }

      messages.innerHTML += `
        <div class="message assistant">
          ${safetyBanner}
          <br>
          <strong>Triage Color:</strong>
          <span style="color:${color};font-weight:700;">${triageColor}</span>
          <br><br>
          <strong>Suggested Tests:</strong>
          <ul>
            ${tests.map(t => `<li>${t}</li>`).join("")}
          </ul>
          <strong>Assigned Doctor (Suggested)</strong><br>
          <span>
            ${finalPayload.assignedDoctor
              ? `${finalPayload.assignedDoctor.name} - ${finalPayload.assignedDoctor.specialty}`
              : "To be assigned"}
          </span>
          <br><br>
          <button class="primary" onclick="openNurseDashboard()">
            Open Nurse Dashboard
          </button>
        </div>
      `;
    }
  }

  function openNurseDashboard() {
    const ts = Date.now(); // Cache buster - works as a hard refresh for the nurse_dashboard page
    window.open("/ui/nurse_dashboard.html", "_blank");
  }
</script>

</body>
</html>
